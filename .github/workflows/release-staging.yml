name: Release to Staging Stage

on:
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    steps:
      - name: Checkout the repository to the runner
        uses: actions/checkout@v3
      - name: Sets env vars for release (STAGING)
        env:
          ENVIRONMENT: staging
        run: |
          echo "CPS_ENVIRONMENT=${ENVIRONMENT}" >> $GITHUB_ENV
